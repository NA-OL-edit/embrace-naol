<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Embrace Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,sans-serif}
body{background:#f5f5f0;min-height:100vh;color:#2c2c2a}
.hidden{display:none!important}

/* LOGIN */
#login-view{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:#fff;border:0.5px solid #d3d1c7;border-radius:12px;padding:28px;width:320px;box-shadow:0 2px 16px rgba(0,0,0,.08)}
.login-box h2{font-size:16px;font-weight:500;margin-bottom:4px}
.login-box p{font-size:12px;color:#888780;margin-bottom:20px}
.form-label{font-size:11px;color:#888780;display:block;margin-bottom:4px;font-weight:500}
.form-input,.form-select,.form-textarea{width:100%;padding:7px 10px;border:0.5px solid #d3d1c7;border-radius:8px;font-size:12px;background:#f1efe8;color:#2c2c2a;outline:none;font-family:inherit}
.form-input:focus,.form-select:focus{border-color:#534AB7}
.form-textarea{resize:vertical}
.form-group{margin-bottom:12px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.err{font-size:11px;color:#e24b4a;margin-top:4px}

/* APP SHELL */
#app-view{display:flex;height:100vh;overflow:hidden}
.sidebar{width:190px;background:#f1efe8;border-right:0.5px solid #d3d1c7;display:flex;flex-direction:column;flex-shrink:0}
.logo{padding:16px;font-size:13px;font-weight:500;border-bottom:0.5px solid #d3d1c7;color:#5f5e5a}
.logo span{color:#2c2c2a}
.sidebar-body{overflow-y:auto;flex:1}
.nav-section{padding:10px 0 4px 16px;font-size:11px;color:#b4b2a9;letter-spacing:.04em}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 16px;cursor:pointer;font-size:13px;color:#5f5e5a;border-left:2px solid transparent;transition:all .12s;user-select:none}
.nav-item:hover{background:#fff;color:#2c2c2a}
.nav-item.active{background:#fff;color:#2c2c2a;border-left-color:#534AB7;font-weight:500}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.sidebar-foot{padding:12px 16px;border-top:0.5px solid #d3d1c7;font-size:12px;color:#b4b2a9;cursor:pointer;transition:color .12s}
.sidebar-foot:hover{color:#e24b4a}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:11px 18px;border-bottom:0.5px solid #d3d1c7;background:#fff;flex-shrink:0}
.page-title-text{font-size:14px;font-weight:500}
.topbar-r{display:flex;gap:8px;align-items:center}
.user-avatar{width:30px;height:30px;border-radius:50%;background:#e6f1fb;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:#185fa5;flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:16px}

/* BUTTONS */
.btn{padding:5px 12px;border-radius:8px;font-size:12px;cursor:pointer;border:0.5px solid #d3d1c7;background:transparent;color:#2c2c2a;transition:all .12s;font-family:inherit}
.btn:hover{background:#f1efe8}
.btn-primary{background:#534AB7;color:#fff;border-color:#534AB7}
.btn-primary:hover{background:#3C3489}
.btn-danger{color:#e24b4a;border-color:rgba(226,75,74,.3)}
.btn-danger:hover{background:rgba(226,75,74,.08)}
.btn-sm{padding:3px 9px;font-size:11px}

/* CARDS & TABLES */
.card{background:#fff;border:0.5px solid #d3d1c7;border-radius:12px;overflow:hidden;margin-bottom:12px}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:0.5px solid #d3d1c7;gap:8px;flex-wrap:wrap}
.card-title{font-size:13px;font-weight:500}
.card-actions{display:flex;gap:8px;align-items:center}
.section-desc{font-size:12px;color:#888780;margin-bottom:14px}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;color:#888780;font-weight:400;padding:8px 14px;background:#f1efe8;border-bottom:0.5px solid #d3d1c7}
td{padding:9px 14px;font-size:12px;border-bottom:0.5px solid #d3d1c7;color:#2c2c2a;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f5f5f0}
.actions{display:flex;gap:5px}
.table-wrap{overflow-x:auto;width:100%}

/* STATS */
.stat-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:16px}
.stat{background:#f1efe8;border-radius:8px;padding:12px}
.stat-l{font-size:11px;color:#888780;margin-bottom:4px}
.stat-v{font-size:20px;font-weight:500}

/* BADGES */
.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:11px}
.badge-g{background:#eaf3de;color:#3b6d11}
.badge-y{background:#faeeda;color:#854f0b}
.badge-b{background:#e6f1fb;color:#185fa5}
.badge-r{background:#fcebeb;color:#a32d2d}

/* LOGS */
.log-row{display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:0.5px solid #d3d1c7;font-size:12px}
.log-row:last-child{border-bottom:none}
.log-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.log-time{font-size:11px;color:#b4b2a9;min-width:80px;flex-shrink:0}

/* MEDIA */
.media-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:12px}
.media-item{aspect-ratio:1;border-radius:8px;background:#f1efe8;border:0.5px solid #d3d1c7;display:flex;align-items:center;justify-content:center;font-size:11px;color:#b4b2a9;cursor:pointer;overflow:hidden;position:relative}
.media-item img{width:100%;height:100%;object-fit:cover;display:block}
.media-item:hover{border-color:#534AB7}
.upload-zone{border:1px dashed #d3d1c7;border-radius:8px;padding:18px;text-align:center;cursor:pointer;color:#888780;font-size:12px}
.upload-zone:hover{border-color:#534AB7;color:#534AB7}

/* SETTINGS */
.settings-group{background:#fff;border:0.5px solid #d3d1c7;border-radius:12px;margin-bottom:12px;overflow:hidden}
.settings-group-title{font-size:12px;font-weight:500;padding:10px 14px;background:#f1efe8;border-bottom:0.5px solid #d3d1c7}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:0.5px solid #d3d1c7}
.settings-row:last-child{border-bottom:none}
.settings-label{font-size:12px;color:#2c2c2a}
.settings-sub{font-size:11px;color:#888780}
.toggle{width:28px;height:16px;border-radius:8px;background:#d3d1c7;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle.on{background:#534AB7}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:#fff;transition:transform .2s}
.toggle.on::after{transform:translateX(12px)}

/* MODAL */
.modal-wrap{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:#fff;border:0.5px solid #d3d1c7;border-radius:12px;width:400px;max-height:90vh;display:flex;flex-direction:column}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:0.5px solid #d3d1c7;flex-shrink:0}
.modal-title{font-size:14px;font-weight:500}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:#b4b2a9;line-height:1}
.modal-body{padding:16px;overflow-y:auto;flex:1}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;padding:12px 16px;border-top:0.5px solid #d3d1c7;flex-shrink:0}

/* SEARCH */
.search-wrap{position:relative}
.search-wrap input{padding:5px 10px 5px 28px;border:0.5px solid #d3d1c7;border-radius:8px;font-size:12px;background:#f1efe8;color:#2c2c2a;width:180px;outline:none;font-family:inherit}
.search-wrap input:focus{border-color:#534AB7}
.search-icon{position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:13px;color:#b4b2a9}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:#534AB7;color:#fff;padding:8px 14px;border-radius:8px;font-size:12px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
.toast.err-toast{background:#e24b4a}

/* SKELETON */
.skel{background:#e8e7e3;border-radius:6px;animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:.3}}

/* CHECKBOX */
input[type=checkbox]{accent-color:#534AB7;cursor:pointer}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-view">
  <div class="login-box">
    <h2>Embrace Admin</h2>
    <p>Sign in to your admin account</p>
    <div id="login-err" class="err hidden"></div>
    <form id="login-form">
      <div class="form-group">
        <label class="form-label">Email address</label>
        <input class="form-input" type="email" id="l-email" required placeholder="admin@email.com"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="l-pwd" required placeholder="••••••••"/>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:4px">Sign in</button>
    </form>
  </div>
</div>

<!-- APP -->
<div id="app-view" class="hidden">
  <div class="sidebar">
    <div class="logo"><span>Embrace</span> Admin</div>
    <div class="sidebar-body">
      <div class="nav-section">Main</div>
      <div class="nav-item active" data-page="dashboard"><div class="dot"></div>Dashboard</div>
      <div class="nav-section">Catalog</div>
      <div class="nav-item" data-page="categories"><div class="dot"></div>Categories</div>
      <div class="nav-item" data-page="products"><div class="dot"></div>Diamonds</div>
      <div class="nav-section">Content</div>
      <div class="nav-item" data-page="media"><div class="dot"></div>Media library</div>
      <div class="nav-section">Admin</div>
      <div class="nav-item" data-page="users"><div class="dot"></div>Users</div>
      <div class="nav-item" data-page="logs"><div class="dot"></div>Audit log</div>
      <div class="nav-section">Account</div>
      <div class="nav-item" data-page="settings"><div class="dot"></div>Settings</div>
      <div class="nav-item" data-page="profile"><div class="dot"></div>My profile</div>
    </div>
    <div class="sidebar-foot" id="btn-logout">Sign out</div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="page-title-text" id="page-title">Dashboard</div>
      <div class="topbar-r">
        <div style="font-size:12px;color:#888780" id="topbar-email">Admin</div>
        <div class="user-avatar" id="topbar-avatar">AD</div>
      </div>
    </div>
    <div class="content" id="page-container"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div id="modal-container"></div>

<script>
const PB = 'http://127.0.0.1:8090';
let token = localStorage.getItem('pb_token');
let adminId = localStorage.getItem('pb_admin_id');
let adminEmail = localStorage.getItem('pb_admin_email') || '';
let currentPage = '';
let toastTimer;

const $ = id => document.getElementById(id);
const pageTitles = {dashboard:'Dashboard',categories:'Catalog — Categories',products:'Catalog — Diamonds',media:'Media library',users:'User management',logs:'Audit log',settings:'Settings',profile:'My profile'};

function toast(msg, isErr=false) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.toggle('err-toast', isErr);
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

async function api(path, opts={}) {
  const h = {'Authorization': token, ...opts.headers};
  if (opts.body && !(opts.body instanceof FormData)) {
    h['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(opts.body);
  }
  const res = await fetch(PB + path, {...opts, headers: h});
  if (res.status === 401) { logout(); throw new Error('Session expired'); }
  const ct = res.headers.get('content-type') || '';
  const data = ct.includes('json') ? await res.json() : await res.text();
  if (!res.ok) throw {message: data.message || 'Error', data: data.data || {}};
  return data;
}

// AUTH
async function init() {
  if (!token) return showLogin();
  try {
    await api('/api/collections/products/records?perPage=1');
    showApp();
  } catch(e) { showLogin(); }
}

function showLogin() { $('login-view').classList.remove('hidden'); $('app-view').classList.add('hidden'); }
function showApp() {
  $('login-view').classList.add('hidden');
  $('app-view').classList.remove('hidden');
  const initials = (adminEmail.split('@')[0] || 'AD').slice(0,2).toUpperCase();
  $('topbar-avatar').textContent = initials;
  $('topbar-email').textContent = adminEmail;
  navigate('dashboard');
}

$('login-form').onsubmit = async e => {
  e.preventDefault();
  $('login-err').classList.add('hidden');
  try {
    const res = await api('/api/collections/_superusers/auth-with-password', {
      method:'POST', body:{identity:$('l-email').value, password:$('l-pwd').value}
    });
    token = res.token;
    adminId = res.record?.id;
    adminEmail = res.record?.email || $('l-email').value;
    localStorage.setItem('pb_token', token);
    localStorage.setItem('pb_admin_id', adminId);
    localStorage.setItem('pb_admin_email', adminEmail);
    showApp();
  } catch(e) {
    $('login-err').textContent = e.message || 'Invalid credentials';
    $('login-err').classList.remove('hidden');
  }
};

function logout() {
  token = null; adminId = null;
  localStorage.clear();
  showLogin();
}
$('btn-logout').onclick = logout;

// NAVIGATION
document.querySelectorAll('.nav-item[data-page]').forEach(el => {
  el.onclick = () => navigate(el.dataset.page);
});
function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const link = document.querySelector(`.nav-item[data-page="${page}"]`);
  if (link) link.classList.add('active');
  $('page-title').textContent = pageTitles[page] || page;
  $('page-container').innerHTML = `<div class="skel" style="height:140px;border-radius:8px;margin-bottom:12px"></div><div class="skel" style="height:200px;border-radius:8px"></div>`;
  const loaders = {dashboard:loadDashboard,products:loadProducts,categories:loadCategories,media:loadMedia,users:loadUsers,logs:loadLogs,settings:loadSettings,profile:loadProfile};
  if (loaders[page]) loaders[page]();
}

// DASHBOARD
async function loadDashboard() {
  try {
    const [p, c, l, m] = await Promise.all([
      api('/api/collections/products/records?perPage=1'),
      api('/api/collections/categories/records?perPage=1'),
      api('/api/collections/logs/records?perPage=1'),
      api('/api/collections/products/records?perPage=5&sort=-created')
    ]);
    $('page-container').innerHTML = `
      <div class="stat-grid">
        <div class="stat"><div class="stat-l">Diamonds</div><div class="stat-v">${p.totalItems}</div><span class="badge badge-g">Live</span></div>
        <div class="stat"><div class="stat-l">Categories</div><div class="stat-v">${c.totalItems}</div><span class="badge badge-g">Active</span></div>
        <div class="stat"><div class="stat-l">Audit logs</div><div class="stat-v">${l.totalItems}</div><span class="badge badge-b">Total</span></div>
        <div class="stat"><div class="stat-l">Connection</div><div class="stat-v" style="font-size:14px;color:#1D9E75">Online</div><span class="badge badge-g">PocketBase</span></div>
      </div>
      <div class="card">
        <div class="card-head"><div class="card-title">Recent diamonds</div><button class="btn btn-primary btn-sm" onclick="navigate('products')">View all</button></div>
        ${m.items.length === 0 ? `<div style="padding:20px;text-align:center;font-size:12px;color:#888780">No products yet</div>` :
          `<table><thead><tr><th>ID</th><th>Description</th><th>Shape</th><th>Certification</th></tr></thead><tbody>
          ${m.items.map(r=>`<tr><td style="font-family:monospace;color:#888780">${r.product_id||'—'}</td><td>${r.description||'—'}</td><td>${r.main_diamond_shape||'—'}</td><td>${r.certification?`<span class="badge badge-g">${r.certification}</span>`:'—'}</td></tr>`).join('')}
          </tbody></table>`}
      </div>
      <div class="card">
        <div class="card-head"><div class="card-title">Quick actions</div></div>
        <div style="padding:12px;display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-primary" onclick="navigate('categories')">+ Add category</button>
          <button class="btn" onclick="navigate('products')">+ Add diamond</button>
          <button class="btn" onclick="navigate('media')">Upload media</button>
        </div>
      </div>`;
  } catch(e) { $('page-container').innerHTML = `<div style="color:#e24b4a;font-size:12px">${e.message}</div>`; }
}

// PRODUCTS (DIAMONDS)
async function loadProducts(filter='') {
  try {
    const url = `/api/collections/products/records?sort=-created&perPage=50${filter ? '&filter='+encodeURIComponent(filter) : ''}`;
    const res = await api(url);
    $('page-container').innerHTML = `
      <p class="section-desc">Full diamond listing — each entry links to its certification and images.</p>
      <div class="card">
        <div class="card-head">
          <div class="card-title">Diamond listings</div>
          <div class="card-actions">
            <div class="search-wrap"><span class="search-icon">⌕</span><input type="text" id="prod-search" placeholder="Search ID, shape…" onkeyup="searchProducts()"/></div>
            <button class="btn btn-primary" onclick="openProductModal()">+ Add diamond</button>
          </div>
        </div>
        ${res.items.length === 0
          ? `<div style="padding:24px;text-align:center;font-size:12px;color:#888780">No diamonds found. Add one to get started.</div>`
          : `<div class="table-wrap"><table><thead><tr>
              <th><input type="checkbox" id="chk-all" onclick="toggleAllChk(this)"></th>
              <th>ID</th><th>Shape</th><th>Weight</th><th>Clarity</th><th>Color</th><th>Cut</th><th>Metal</th><th>Cert</th><th>Image</th><th>Actions</th>
            </tr></thead><tbody id="prod-body">
            ${res.items.map(r=>`<tr>
              <td><input type="checkbox" class="row-chk" value="${r.id}"></td>
              <td style="font-family:monospace;font-size:11px;color:#888780">${r.product_id||'—'}</td>
              <td>${r.main_diamond_shape||'—'}</td>
              <td>${r.main_diamond_weight||'—'}</td>
              <td>${r.main_diamond_clarity||'—'}</td>
              <td>${r.main_diamond_color||'—'}</td>
              <td>${r.cut||'—'}</td>
              <td>${r.metal_type||'—'}</td>
              <td>${r.certification?`<span class="badge badge-g">${r.certification}</span>`:'—'}</td>
              <td>${r.image?`<img src="${PB}/api/files/products/${r.id}/${r.image}?thumb=60x60" style="height:36px;border-radius:4px;object-fit:cover" onclick="previewImg('${PB}/api/files/products/${r.id}/${r.image}')">`:
              '—'}</td>
              <td><div class="actions">
                <button class="btn btn-sm" onclick='openProductModal(${JSON.stringify(r).replace(/'/g,"&#39;")})'>Edit</button>
                <button class="btn btn-sm btn-danger" onclick="delRecord('products','${r.id}',loadProducts)">Del</button>
              </div></td>
            </tr>`).join('')}
            </tbody></table></div>
            <div style="padding:10px 14px;display:flex;gap:8px;border-top:0.5px solid #d3d1c7">
              <button class="btn btn-sm btn-danger" onclick="bulkDel('products',loadProducts)">Delete selected</button>
              <span style="font-size:11px;color:#888780;line-height:2">${res.totalItems} total</span>
            </div>`}
      </div>`;
  } catch(e) { $('page-container').innerHTML = `<div style="color:#e24b4a;font-size:12px">${e.message}</div>`; }
}

function searchProducts() {
  const v = $('prod-search')?.value || '';
  if (v.length >= 2) loadProducts(`product_id~"${v}" || main_diamond_shape~"${v}" || certification~"${v}"`);
  else if (v.length === 0) loadProducts();
}

function openProductModal(rec=null) {
  const fields = ['product_id','description','main_diamond_shape','main_diamond_weight','main_diamond_clarity','main_diamond_color','cut','symmetry','polish','secondary_diamond_weight','secondary_diamond_clarity','secondary_diamond_color','metal_type','metal_purity','metal_color','metal_weight','replacement_value','certification'];
  const nums = new Set(['main_diamond_weight','main_diamond_weight','secondary_diamond_weight','metal_weight','replacement_value']);
  const v = rec || {};
  const html = `<form id="prod-form">
    <div class="form-row">${fields.map(f=>`<div class="form-group" style="margin:0;margin-bottom:10px">
      <label class="form-label">${f.replace(/_/g,' ')}</label>
      <input class="form-input" name="${f}" type="${nums.has(f)?'number':'text'}" value="${v[f]||''}" step="${nums.has(f)?'0.01':''}">
      <div class="err" id="err-${f}"></div>
    </div>`).join('')}</div>
    <div class="form-group">
      <label class="form-label">Image${v.image?` (current: ${v.image})`:''}</label>
      <input class="form-input" name="image" type="file" accept="image/*">
    </div>
  </form>`;
  openModal(rec ? 'Edit Diamond' : 'Add Diamond', html, async () => {
    const form = $('prod-form');
    const fd = new FormData(form);
    const imgFile = fd.get('image');
    if (imgFile instanceof File && imgFile.size === 0) fd.delete('image');
    try {
      const url = rec ? `/api/collections/products/records/${rec.id}` : '/api/collections/products/records';
      await api(url, {method: rec?'PATCH':'POST', body: fd});
      toast(rec ? 'Diamond updated' : 'Diamond added');
      closeModal(); loadProducts();
      logAction('product', rec ? 'updated' : 'created', fd.get('product_id') || rec?.id);
    } catch(e) {
      if (e.data) Object.entries(e.data).forEach(([k,v])=>{ const el=$(`err-${k}`); if(el) el.textContent=v.message; });
      toast(e.message||'Save failed', true);
    }
  });
}

// CATEGORIES
async function loadCategories() {
  try {
    const res = await api('/api/collections/categories/records?sort=-created');
    $('page-container').innerHTML = `
      <p class="section-desc">Manage diamond categories — add, edit, or delete types and albums.</p>
      <div class="card">
        <div class="card-head">
          <div class="card-title">All categories</div>
          <button class="btn btn-primary" onclick="openCatModal()">+ Add category</button>
        </div>
        ${res.items.length === 0
          ? `<div style="padding:24px;text-align:center;font-size:12px;color:#888780">No categories yet.</div>`
          : `<table><thead><tr><th>Name</th><th>Type</th><th>Status</th><th>Image</th><th>Actions</th></tr></thead><tbody>
          ${res.items.map(r=>`<tr>
            <td style="font-weight:500">${r.name||'—'}</td>
            <td>${r.type||'—'}</td>
            <td>${r.status==='active'?`<span class="badge badge-g">Active</span>`:`<span class="badge badge-y">Draft</span>`}</td>
            <td>${r.image?`<img src="${PB}/api/files/categories/${r.id}/${r.image}?thumb=50x50" style="height:34px;border-radius:4px;object-fit:cover">`:'-'}</td>
            <td><div class="actions">
              <button class="btn btn-sm" onclick='openCatModal(${JSON.stringify(r).replace(/'/g,"&#39;")})'>Edit</button>
              <button class="btn btn-sm btn-danger" onclick="delRecord('categories','${r.id}',loadCategories)">Delete</button>
            </div></td>
          </tr>`).join('')}
          </tbody></table>`}
      </div>`;
  } catch(e) { $('page-container').innerHTML = e.message; }
}

function openCatModal(rec=null) {
  const v = rec || {};
  const html = `<form id="cat-form">
    <div class="form-group"><label class="form-label">Type</label>
      <select class="form-select" name="type">
        ${['Diamond','Metal cert','Album'].map(o=>`<option${v.type===o?' selected':''}>${o}</option>`).join('')}
      </select></div>
    <div class="form-group"><label class="form-label">Name</label>
      <input class="form-input" name="name" value="${v.name||''}" placeholder="e.g. Round Brilliant">
      <div class="err" id="err-name"></div></div>
    <div class="form-group"><label class="form-label">Description</label>
      <textarea class="form-input form-textarea" name="description" rows="2">${v.description||''}</textarea></div>
    <div class="form-group"><label class="form-label">Status</label>
      <select class="form-select" name="status">
        ${['active','draft'].map(o=>`<option${v.status===o?' selected':''}>${o}</option>`).join('')}
      </select></div>
    <div class="form-group"><label class="form-label">Image${v.image?` (current: ${v.image})`:''}</label>
      <input class="form-input" name="image" type="file" accept="image/*"></div>
  </form>`;
  openModal(rec ? 'Edit Category' : 'Add Category', html, async () => {
    const fd = new FormData($('cat-form'));
    const imgFile = fd.get('image');
    if (imgFile instanceof File && imgFile.size === 0) fd.delete('image');
    try {
      const url = rec ? `/api/collections/categories/records/${rec.id}` : '/api/collections/categories/records';
      await api(url, {method: rec?'PATCH':'POST', body: fd});
      toast(rec ? 'Category updated' : 'Category added');
      closeModal(); loadCategories();
      logAction('category', rec ? 'updated' : 'created', fd.get('name') || rec?.id);
    } catch(e) {
      if(e.data) Object.entries(e.data).forEach(([k,v])=>{ const el=$(`err-${k}`); if(el) el.textContent=v.message; });
      toast(e.message||'Save failed', true);
    }
  });
}

// MEDIA
async function loadMedia() {
  try {
    const res = await api('/api/collections/products/records?perPage=100&filter=(image!="")');
    $('page-container').innerHTML = `
      <p class="section-desc">All uploaded product images. Click to preview full size.</p>
      <div class="card" style="margin-bottom:12px">
        <div class="card-head"><div class="card-title">Upload files</div></div>
        <div style="padding:12px">
          <label class="upload-zone">Click or drag files here · JPG, PNG, WEBP (max 10MB)
            <input type="file" accept="image/*" class="hidden" id="media-upload" onchange="handleMediaUpload(this)">
          </label>
        </div>
      </div>
      <div class="card">
        <div class="card-head"><div class="card-title">Media library <span style="color:#888780;font-weight:400">(${res.totalItems} items)</span></div></div>
        <div class="media-grid">
          ${res.items.filter(r=>r.image).map(r=>`
            <div class="media-item" onclick="previewImg('${PB}/api/files/products/${r.id}/${r.image}')">
              <img src="${PB}/api/files/products/${r.id}/${r.image}?thumb=150x150" alt="${r.product_id}">
            </div>`).join('')}
          ${res.items.filter(r=>r.image).length===0?`<div style="grid-column:span 5;padding:24px;text-align:center;font-size:12px;color:#888780">No images uploaded yet.</div>`:''}
        </div>
      </div>`;
  } catch(e) { $('page-container').innerHTML = e.message; }
}

async function handleMediaUpload(input) {
  if (!input.files[0]) return;
  toast('Uploading…');
  const fd = new FormData();
  fd.append('product_id', 'UPLOAD-' + Date.now());
  fd.append('image', input.files[0]);
  try {
    await api('/api/collections/products/records', {method:'POST', body:fd});
    toast('Image uploaded');
    loadMedia();
  } catch(e) { toast(e.message, true); }
}

function previewImg(url) {
  const html = `<div style="text-align:center"><img src="${url}" style="max-width:100%;max-height:400px;border-radius:8px"></div>`;
  openModal('Image Preview', html, null, false);
}

// LOGS
async function loadLogs() {
  try {
    const res = await api('/api/collections/logs/records?sort=-created&perPage=50');
    const dotColors = {updated:'#534AB7',created:'#1D9E75',deleted:'#e24b4a'};
    $('page-container').innerHTML = `
      <p class="section-desc">Full history of all admin actions.</p>
      <div class="card">
        <div class="card-head">
          <div class="card-title">Audit log</div>
          <div class="search-wrap"><span class="search-icon">⌕</span><input type="text" placeholder="Search logs…" oninput="filterLogs(this.value)"></div>
        </div>
        <div id="log-list">
        ${res.items.length===0
          ? `<div style="padding:24px;text-align:center;font-size:12px;color:#888780">No activity logged yet.</div>`
          : res.items.map(l=>`
          <div class="log-row">
            <div class="log-dot" style="background:${dotColors[l.action]||'#888780'}"></div>
            <div class="log-time">${timeAgo(l.created)}</div>

function filterLogs(v) {
  document.querySelectorAll('.log-row').forEach(r=>{ r.style.display=r.textContent.toLowerCase().includes(v.toLowerCase())?'':'none'; });
}

// SETTINGS
let settingRecords = [];
async function loadSettings() {
  try {
    const res = await api('/api/collections/settings/records');
    settingRecords = res.items;
    const getV = k => res.items.find(r=>r.key===k)?.value;
    $('page-container').innerHTML = `
      <p class="section-desc">Global site configuration and preferences.</p>
      <div class="settings-group">
        <div class="settings-group-title">Site identity</div>
        <div style="padding:12px">
          <div class="form-group" style="margin-bottom:0">
            <label class="form-label">Site name</label>
            <input class="form-input" id="s-site-name" value="${getV('site_name')||''}">
          </div>
        </div>
      </div>
      <div class="settings-group">
        <div class="settings-group-title">Notifications</div>
        <div class="settings-row">
          <div><div class="settings-label">Email on new upload</div><div class="settings-sub">Send email when media is uploaded</div></div>
          <div class="toggle${getV('email_on_upload')==='true'?' on':''}" id="t-email-upload" onclick="this.classList.toggle('on')"></div>
        </div>
        <div class="settings-row">
          <div><div class="settings-label">Weekly summary</div><div class="settings-sub">Activity digest every Monday</div></div>
          <div class="toggle${getV('weekly_summary')==='true'?' on':''}" id="t-weekly" onclick="this.classList.toggle('on')"></div>
        </div>
      </div>
      <div style="text-align:right"><button class="btn btn-primary" onclick="saveSettings()">Save changes</button></div>`;
  } catch(e) { $('page-container').innerHTML = e.message; }
}

async function saveSettings() {
  const updates = [
    {key:'site_name', value: $('s-site-name').value},
    {key:'email_on_upload', value: String($('t-email-upload').classList.contains('on'))},
    {key:'weekly_summary', value: String($('t-weekly').classList.contains('on'))}
  ];
  try {
    for (const u of updates) {
      const rec = settingRecords.find(r=>r.key===u.key);
      if (rec) await api(`/api/collections/settings/records/${rec.id}`, {method:'PATCH', body:{value:u.value}});
      else await api('/api/collections/settings/records', {method:'POST', body:u});
    }
    toast('Settings saved');
  } catch(e) { toast(e.message, true); }
}

// PROFILE
function loadProfile() {
  const initials = (adminEmail.split('@')[0] || 'AD').slice(0,2).toUpperCase();
  $('page-container').innerHTML = `
    <p class="section-desc">Your account details and security settings.</p>
    <div class="settings-group">
      <div class="settings-group-title">Personal info</div>
      <div style="padding:12px">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
          <div class="user-avatar" style="width:44px;height:44px;font-size:15px">${initials}</div>
          <div style="font-size:13px;font-weight:500">${adminEmail}</div>
        </div>
        <div class="form-group"><label class="form-label">Email address</label>
          <input class="form-input" id="p-email" value="${adminEmail}"></div>
      </div>
    </div>
    <div class="settings-group">
      <div class="settings-group-title">Change password</div>
      <div style="padding:12px">
        <div class="form-group"><label class="form-label">Current password</label>
          <input class="form-input" type="password" id="p-old-pwd" placeholder="••••••••"></div>
        <div class="form-row">
          <div class="form-group" style="margin:0"><label class="form-label">New password</label>
            <input class="form-input" type="password" id="p-new-pwd" placeholder="••••••••"></div>
          <div class="form-group" style="margin:0"><label class="form-label">Confirm</label>
            <input class="form-input" type="password" id="p-confirm-pwd" placeholder="••••••••"></div>
        </div>
      </div>
    </div>
    <div class="settings-group">
      <div class="settings-group-title">Two-factor authentication</div>
      <div class="settings-row">
        <div><div class="settings-label">Enable 2FA</div><div class="settings-sub">Use authenticator app</div></div>
        <button class="btn btn-sm" onclick="show2FAModal()">Set up</button>
      </div>
    </div>
    <div style="text-align:right;margin-top:10px"><button class="btn btn-primary" onclick="saveProfile()">Save profile</button></div>`;
}

async function saveProfile() {
  const email = $('p-email').value;
  const oldPwd = $('p-old-pwd').value;
  const newPwd = $('p-new-pwd').value;
  const confirmPwd = $('p-confirm-pwd').value;
  const payload = {};
  if (email && email !== adminEmail) payload.email = email;
  if (newPwd) {
    if (newPwd !== confirmPwd) return toast('Passwords do not match', true);
    payload.password = newPwd; payload.passwordConfirm = confirmPwd; payload.oldPassword = oldPwd;
  }
  if (!Object.keys(payload).length) return toast('Nothing to save');
  try {
    await api(`/api/collections/_superusers/records/${adminId}`, {method:'PATCH', body:payload});
    if (email) { adminEmail = email; localStorage.setItem('pb_admin_email', email); $('topbar-email').textContent = email; }
    toast('Profile saved');
  } catch(e) { toast(e.message, true); }
}

function show2FAModal() {
  const html = `<div style="text-align:center">
    <div style="width:80px;height:80px;background:#f1efe8;border-radius:8px;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#b4b2a9">QR code</div>
    <p style="font-size:12px;color:#888780;margin-bottom:12px">Scan with Google Authenticator or Authy</p>
    <div class="form-group"><label class="form-label">Enter 6-digit code</label>
      <input class="form-input" placeholder="000000" style="text-align:center;letter-spacing:.2em"></div>
  </div>`;
  openModal('Set up 2FA', html, () => { closeModal(); toast('2FA enabled'); });
}

// HELPERS
async function delRecord(col, id, reload) {
  if (!confirm('Delete this item? This cannot be undone.')) return;
  try { await api(`/api/collections/${col}/records/${id}`, {method:'DELETE'}); toast('Deleted'); reload(); }
  catch(e) { toast(e.message, true); }
}

async function bulkDel(col, reload) {
  const ids = [...document.querySelectorAll('.row-chk:checked')].map(c=>c.value);
  if (!ids.length) return toast('Select items first');
  if (!confirm(`Delete ${ids.length} item(s)?`)) return;
  for (const id of ids) await api(`/api/collections/${col}/records/${id}`, {method:'DELETE'}).catch(()=>{});
  toast(`Deleted ${ids.length} item(s)`); reload();
}

function toggleAllChk(master) {
  document.querySelectorAll('.row-chk').forEach(c => c.checked = master.checked);
}

async function logAction(target, action, name) {
  api('/api/collections/logs/records', {method:'POST', body:{admin_email:adminEmail, action, target:`${target}: ${name}`}}).catch(()=>{});
}

function timeAgo(dateStr) {
  const d = new Date(dateStr), now = new Date(), diff = Math.floor((now - d) / 1000);
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return d.toLocaleDateString();
}

// MODAL ENGINE
function openModal(title, bodyHtml, onSave, showSave=true) {
  $('modal-container').innerHTML = `
    <div class="modal-wrap" id="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal" style="width:480px">
        <div class="modal-head">
          <div class="modal-title">${title}</div>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="modal-body" id="modal-body">${bodyHtml}</div>
        <div class="modal-foot">
          <button class="btn" onclick="closeModal()">Cancel</button>
          ${showSave ? `<button class="btn btn-primary" id="modal-save-btn">Save</button>` : ''}
        </div>
      </div>
    </div>`;
  if (showSave && onSave) $('modal-save-btn').onclick = onSave;
}
function closeModal() { $('modal-container').innerHTML = ''; }

init();
</script>
