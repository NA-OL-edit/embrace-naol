<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Application title and metadata -->
    <title>Embrace Jewelery</title>
    <meta name="description" content="Embrace Jewelery" />
    <meta name="author" content="Embrace Jewelery" />

    <!-- Open Graph / Twitter -->
    <meta property="og:title" content="Embrace Jewelery" />
    <meta property="og:description" content="Embrace Jewelery" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/placeholder.svg" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@EmbraceJewelery" />
    <meta name="twitter:image" content="/placeholder.svg" />

    <!-- Favicon links: use provided Logo.ico and SVG fallback -->
    <link rel="icon" href="%BASE_URL%Logo.ico" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%placeholder.svg" />
    <link rel="apple-touch-icon" href="%BASE_URL%Logo.ico" />
  </head>

  <body>
    <div id="root"></div>
    <script>
      // Handles the GitHub Pages 404.html redirect (and similar static-host redirects).
      // If the site is loaded at "/?redirect=/some/path", restore the intended URL before React mounts.
      (function () {
        try {
          var url = new URL(window.location.href);
          var redirect = url.searchParams.get("redirect");
          if (!redirect) return;
          url.searchParams.delete("redirect");
          var next = decodeURIComponent(redirect);
          window.history.replaceState(null, "", next);
        } catch {
          // ignore
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
