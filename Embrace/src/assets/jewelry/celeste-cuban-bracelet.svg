<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0b12"/>
      <stop offset="0.55" stop-color="#1c0f16"/>
      <stop offset="1" stop-color="#0b0b12"/>
    </linearGradient>
    <linearGradient id="rose" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f7c7b7"/>
      <stop offset="0.35" stop-color="#d69a8c"/>
      <stop offset="0.7" stop-color="#b66c63"/>
      <stop offset="1" stop-color="#f7c7b7"/>
    </linearGradient>
    <radialGradient id="spark" cx="50%" cy="50%" r="55%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="0.2" stop-color="#ffe9f1" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow3" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="900" fill="url(#bg3)"/>

  <!-- Bracelet links -->
  <g opacity="0.9">
    <rect x="190" y="360" width="820" height="180" rx="90" fill="none" stroke="url(#rose)" stroke-width="26"/>
    <g fill="none" stroke="url(#rose)" stroke-width="22" stroke-linecap="round">
      <path d="M270 450h120"/>
      <path d="M390 450h120"/>
      <path d="M510 450h120"/>
      <path d="M630 450h120"/>
      <path d="M750 450h120"/>
      <path d="M870 450h70"/>
    </g>
  </g>

  <!-- Iced clasp -->
  <g filter="url(#glow3)">
    <rect x="520" y="380" width="160" height="140" rx="28" fill="#ffffff" opacity="0.08" stroke="#ffe9f1" stroke-opacity="0.45" stroke-width="2"/>
    <circle cx="560" cy="430" r="10" fill="url(#spark)" />
    <circle cx="600" cy="430" r="10" fill="url(#spark)" />
    <circle cx="640" cy="430" r="10" fill="url(#spark)" />
    <circle cx="580" cy="470" r="10" fill="url(#spark)" />
    <circle cx="620" cy="470" r="10" fill="url(#spark)" />
  </g>

  <text x="600" y="830" text-anchor="middle" fill="#d69a8c" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="26" letter-spacing="6" opacity="0.9">
    CELESTE CUBAN BRACELET
  </text>
</svg>
