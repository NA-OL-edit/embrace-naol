<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0f19"/>
      <stop offset="0.55" stop-color="#121a2c"/>
      <stop offset="1" stop-color="#0b0f19"/>
    </linearGradient>
    <radialGradient id="gold" cx="50%" cy="45%" r="55%">
      <stop offset="0" stop-color="#f6e27a" stop-opacity="0.95"/>
      <stop offset="0.35" stop-color="#caa04a" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#7a5a1b" stop-opacity="0.0"/>
    </radialGradient>
    <radialGradient id="diamond" cx="50%" cy="45%" r="55%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="0.25" stop-color="#d6f3ff" stop-opacity="0.95"/>
      <stop offset="0.65" stop-color="#9ad0ff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#7aa7ff" stop-opacity="0.0"/>
    </radialGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="900" fill="url(#bg)"/>
  <circle cx="600" cy="410" r="330" fill="url(#gold)"/>

  <!-- Ring band -->
  <path d="M320 560c120 90 440 90 560 0"
        fill="none" stroke="#caa04a" stroke-width="26" stroke-linecap="round" opacity="0.85"/>
  <path d="M350 560c105 70 395 70 500 0"
        fill="none" stroke="#f6e27a" stroke-width="10" stroke-linecap="round" opacity="0.55"/>

  <!-- Setting -->
  <path d="M540 520c20-40 100-40 120 0" fill="none" stroke="#f6e27a" stroke-width="10" opacity="0.5"/>
  <path d="M520 520c35-70 125-70 160 0" fill="none" stroke="#caa04a" stroke-width="18" opacity="0.75"/>

  <!-- Diamond -->
  <g filter="url(#softGlow)">
    <polygon points="600,250 670,330 600,450 530,330" fill="url(#diamond)"/>
    <polygon points="600,250 625,330 600,450 575,330" fill="#ffffff" opacity="0.65"/>
    <polygon points="530,330 600,250 600,330" fill="#d6f3ff" opacity="0.55"/>
    <polygon points="670,330 600,250 600,330" fill="#ffffff" opacity="0.55"/>
    <circle cx="600" cy="330" r="120" fill="url(#diamond)" opacity="0.35"/>
  </g>

  <text x="600" y="830" text-anchor="middle" fill="#caa04a" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="26" letter-spacing="6" opacity="0.85">
    AURORA SOLITAIRE
  </text>
</svg>
