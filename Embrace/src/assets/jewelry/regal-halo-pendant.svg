<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset="0.5" stop-color="#14120c"/>
      <stop offset="1" stop-color="#0a0a0a"/>
    </linearGradient>
    <radialGradient id="gold2" cx="50%" cy="40%" r="60%">
      <stop offset="0" stop-color="#ffd27a" stop-opacity="0.95"/>
      <stop offset="0.35" stop-color="#caa04a" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#7a5a1b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gem" cx="50%" cy="45%" r="55%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="0.25" stop-color="#e8fff6" stop-opacity="0.95"/>
      <stop offset="0.7" stop-color="#b7ffe6" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#6ee7c3" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow2" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="900" fill="url(#bg2)"/>
  <circle cx="600" cy="360" r="360" fill="url(#gold2)"/>

  <!-- Chain -->
  <path d="M600 80c-60 40-120 70-180 90" fill="none" stroke="#caa04a" stroke-width="10" stroke-linecap="round" opacity="0.85"/>
  <path d="M600 80c60 40 120 70 180 90" fill="none" stroke="#caa04a" stroke-width="10" stroke-linecap="round" opacity="0.85"/>

  <!-- Pendant loop -->
  <path d="M560 170c0-40 80-40 80 0" fill="none" stroke="#ffd27a" stroke-width="12" opacity="0.8"/>

  <!-- Halo + center stone -->
  <g filter="url(#glow2)">
    <ellipse cx="600" cy="360" rx="170" ry="220" fill="none" stroke="#ffd27a" stroke-width="18" opacity="0.9"/>
    <ellipse cx="600" cy="360" rx="140" ry="190" fill="none" stroke="#caa04a" stroke-width="10" opacity="0.55"/>
    <ellipse cx="600" cy="360" rx="110" ry="160" fill="url(#gem)" opacity="0.95"/>
    <path d="M600 210L690 360 600 510 510 360Z" fill="#ffffff" opacity="0.6"/>
  </g>

  <text x="600" y="830" text-anchor="middle" fill="#caa04a" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="26" letter-spacing="6" opacity="0.85">
    REGAL HALO PENDANT
  </text>
</svg>
